<vbox
  id="__addonRef__-preferences-pane"
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
>
  <script src="chrome://ObsidianBridge/content/preferencesPane.js"></script>

  <groupbox>
    <label><html:h2 data-l10n-id="basic-title"></html:h2></label>
    <html:div class="bn-pref-section" data-bn-section="basic"></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="editor-title"></html:h2></label>
    <html:div class="bn-pref-section" data-bn-section="editor"></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="sync-title"></html:h2></label>
    <html:div class="bn-pref-section" data-bn-section="sync"></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="template-title"></html:h2></label>
    <html:div class="bn-pref-section" data-bn-section="template"></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="obsidian-title"></html:h2></label>
    <html:div
      class="bn-pref-section ob-prefs-root"
      id="__addonRef__-obsidian-settingsRoot"
      data-bn-section="obsidian"
    ></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="annotationNote-title"></html:h2></label>
    <html:div class="bn-pref-section" data-bn-section="annotation"></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="about-title"></html:h2></label>
    <html:div class="bn-pref-section" data-bn-section="about"></html:div>
  </groupbox>
</vbox>
